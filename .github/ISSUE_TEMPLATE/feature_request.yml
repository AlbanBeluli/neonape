name: Feature request
description: Suggest an improvement to Neon Ape
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Security, UX, or compatibility notes.
